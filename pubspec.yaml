name: flutter_smart_workforce_management
description: Large-scale workforce management system with geofence attendance, live GPS tracking, role-based permissions, offline sync, analytics dashboard, and background location services.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management (Riverpod)
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  hooks_riverpod: ^2.4.9
  flutter_hooks: ^0.20.4

  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.3
  geocoding: ^2.1.1
  geofencing: ^0.0.1

  # Background Services
  flutter_background_service: ^5.0.5
  background_fetch: ^1.2.4
  workmanager: ^0.5.2

  # Networking
  dio: ^5.3.2
  retrofit: ^4.1.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.8
  firebase_performance: ^0.9.3+8

  # Local Storage (Offline sync)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0

  # Authentication
  local_auth: ^2.1.7
  google_sign_in: ^6.2.1

  # Camera (QR Attendance)
  camera: ^0.10.5+9
  qr_code_scanner: ^1.0.1
  qr_flutter: ^4.1.0

  # Charts (Analytics Dashboard)
  fl_chart: ^0.66.2

  # PDF Reports
  pdf: ^3.10.8
  printing: ^5.12.0
  csv: ^6.0.0

  # UI
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_local_notifications: ^16.3.2

  # Utils
  uuid: ^4.1.0
  intl: ^0.18.1
  connectivity_plus: ^5.0.2
  rxdart: ^0.27.7
  logger: ^2.0.2+1
  encrypt: ^5.0.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  permission_handler: ^11.0.1
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  mocktail: ^1.0.1
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
