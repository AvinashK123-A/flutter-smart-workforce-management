def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}
def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) throw new GradleException("Flutter SDK not found.")
def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.crashlytics'
apply plugin: 'com.google.firebase.firebase-perf'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.avinash.workforce.management"
    compileSdk 34
    ndkVersion flutter.ndkVersion
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
    sourceSets { main.java.srcDirs += 'src/main/kotlin' }

    defaultConfig {
        applicationId "com.avinash.workforce.management"
        minSdkVersion 23
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        manifestPlaceholders = [
            appAuthRedirectScheme: "com.avinash.workforce.management",
            mapsApiKey: System.getenv('MAPS_API_KEY') ?: 'YOUR_MAPS_API_KEY'
        ]
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias'] ?: System.getenv('KEY_ALIAS')
            keyPassword keystoreProperties['keyPassword'] ?: System.getenv('KEY_PASSWORD')
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword'] ?: System.getenv('STORE_PASSWORD')
        }
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
            minifyEnabled false
        }
    }

    flavorDimensions "environment"
    productFlavors {
        dev {
            dimension "environment"
            applicationIdSuffix ".dev"
            buildConfigField "String", "BASE_URL", '"https://dev-api.workforce.com/v1"'
            buildConfigField "String", "ENVIRONMENT", '"dev"'
            buildConfigField "boolean", "ENABLE_LOGS", "true"
            // Geofence config (meters)
            buildConfigField "float", "GEOFENCE_RADIUS_METERS", "100.0f"
            buildConfigField "long", "LOCATION_UPDATE_INTERVAL_MS", "30000L"
            buildConfigField "long", "LOCATION_FASTEST_INTERVAL_MS", "10000L"
            resValue "string", "app_name", "Workforce Dev"
            resValue "string", "google_maps_key", System.getenv('DEV_MAPS_API_KEY') ?: 'YOUR_DEV_MAPS_KEY'
        }
        qa {
            dimension "environment"
            applicationIdSuffix ".qa"
            buildConfigField "String", "BASE_URL", '"https://qa-api.workforce.com/v1"'
            buildConfigField "String", "ENVIRONMENT", '"qa"'
            buildConfigField "boolean", "ENABLE_LOGS", "true"
            buildConfigField "float", "GEOFENCE_RADIUS_METERS", "50.0f"
            buildConfigField "long", "LOCATION_UPDATE_INTERVAL_MS", "15000L"
            buildConfigField "long", "LOCATION_FASTEST_INTERVAL_MS", "5000L"
            resValue "string", "app_name", "Workforce QA"
            resValue "string", "google_maps_key", System.getenv('QA_MAPS_API_KEY') ?: 'YOUR_QA_MAPS_KEY'
        }
        uat {
            dimension "environment"
            applicationIdSuffix ".uat"
            buildConfigField "String", "BASE_URL", '"https://uat-api.workforce.com/v1"'
            buildConfigField "String", "ENVIRONMENT", '"uat"'
            buildConfigField "boolean", "ENABLE_LOGS", "false"
            buildConfigField "float", "GEOFENCE_RADIUS_METERS", "50.0f"
            buildConfigField "long", "LOCATION_UPDATE_INTERVAL_MS", "15000L"
            buildConfigField "long", "LOCATION_FASTEST_INTERVAL_MS", "5000L"
            resValue "string", "app_name", "Workforce UAT"
            resValue "string", "google_maps_key", System.getenv('UAT_MAPS_API_KEY') ?: 'YOUR_UAT_MAPS_KEY'
        }
        prod {
            dimension "environment"
            buildConfigField "String", "BASE_URL", '"https://api.workforce.com/v1"'
            buildConfigField "String", "ENVIRONMENT", '"production"'
            buildConfigField "boolean", "ENABLE_LOGS", "false"
            buildConfigField "float", "GEOFENCE_RADIUS_METERS", "50.0f"
            buildConfigField "long", "LOCATION_UPDATE_INTERVAL_MS", "10000L"
            buildConfigField "long", "LOCATION_FASTEST_INTERVAL_MS", "5000L"
            resValue "string", "app_name", "Workforce Manager"
            resValue "string", "google_maps_key", System.getenv('PROD_MAPS_API_KEY') ?: 'YOUR_PROD_MAPS_KEY'
        }
    }
}

flutter { source '../..' }

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation platform('com.google.firebase:firebase-bom:32.6.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-perf'
    implementation 'androidx.multidex:multidex:2.0.1'

    // Location & Maps
    implementation 'com.google.android.gms:play-services-location:21.0.1'
    implementation 'com.google.android.gms:play-services-maps:18.2.0'
    implementation 'com.google.maps.android:maps-ktx:5.0.0'

    // Geofencing
    implementation 'com.google.android.gms:play-services-location:21.0.1'

    // Background processing
    implementation 'androidx.work:work-runtime-ktx:2.9.0'
    implementation 'androidx.lifecycle:lifecycle-service:2.7.0'

    // Secure Storage
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    implementation 'net.zetetic:android-database-sqlcipher:4.5.4'

    // Camera (QR/barcode attendance)
    implementation 'androidx.camera:camera-camera2:1.3.1'
    implementation 'androidx.camera:camera-lifecycle:1.3.1'
    implementation 'com.google.mlkit:barcode-scanning:17.2.0'

    // Biometric for punch-in confirmation
    implementation 'androidx.biometric:biometric-ktx:1.2.0-alpha05'

    // Room for offline data
    implementation 'androidx.room:room-runtime:2.6.1'
    implementation 'androidx.room:room-ktx:2.6.1'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
}
